name: Registry

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Validate registry manifest
        run: node scripts/check-registry.mjs

      - name: Validate styleguide examples
        run: node scripts/check-examples.mjs

      - name: Validate shipped AI rule sync
        run: node scripts/check-rule.mjs

      - name: Generate lint manifest
        run: npm run gen:lint-manifest

      - name: On-system lint manifest sync
        run: node scripts/check-lint-manifest.mjs

      - name: MCP data sync
        run: node scripts/check-mcp-data.mjs

      - name: Test lint packages
        run: npm run test:packages

      - name: Dogfood on-system lint
        run: npm run lint:on-system

      - name: Sync generated app files
        run: node scripts/sync-registry.mjs

      - name: Build shadcn registry
        run: npm run registry:build

      - name: Verify built registry output
        run: node scripts/check-registry.mjs --built
