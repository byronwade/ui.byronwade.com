name: Test

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Sync generated components
        run: node scripts/sync-registry.mjs

      - name: Generate lint manifest
        run: npm run gen:lint-manifest

      - name: Build workspace packages
        run: npm run build --workspace @byronwade/on-system-core && npm run build --workspace @byronwade/lint

      - name: Check test coverage gate
        run: npm run check:tests

      - name: Run test suite with coverage
        run: npm run test:ci
